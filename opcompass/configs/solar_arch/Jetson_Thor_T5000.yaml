# NVIDIA Jetson T5000 module (Thor SoC, Blackwell GPU)
# Values are derived from docs/hardware/nvidia/jetson-thor-technical-brief.pdf
# TB-12572-001, Tables 1-2, plus OpCompass dense peak definitions.
name: "Jetson_Thor_T5000"
