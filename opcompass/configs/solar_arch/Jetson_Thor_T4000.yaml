# NVIDIA Jetson T4000 module (Thor SoC, Blackwell GPU)
# Values use NVIDIA's current Jetson Thor product specifications.
# NVIDIA publishes 1200 TFLOPS FP4 sparse; OpCompass records dense peaks.
# FP8/FP16/TF32 are derived from the usual Blackwell Tensor Core ratios.
name: "Jetson_Thor_T4000"
SRAM_capacity: 7549747  # 12 MB * 12 / 20
SRAM_byte_per_cycle: 153  # 255 * 12 / 20, approximate
DRAM_capacity: 68719476736  # 64 GB LPDDR5x
DRAM_byte_per_cycle: 178.4313725490196  # 273 GB/s at 1.53 GHz
freq_GHz: 1.53
MAC_per_cycle_fp32_sm: 1536  # 1536 CUDA cores @ 1.53 GHz, MAC = 2 FLOPs
MAC_per_cycle_tf32_tc: 24509.803921568626  # 75 TFLOPS TF32 derived
MAC_per_cycle_fp16_tc: 49019.60784313725  # 150 TFLOPS FP16 derived
MAC_per_cycle_bf16_tc: 49019.60784313725  # Same as FP16
MAC_per_cycle_fp8_tc: 98039.2156862745  # 300 TFLOPS FP8 derived
MAC_per_cycle_int8_tc: 98039.2156862745  # 300 TOPS INT8 derived
MAC_per_cycle_fp4_tc: 196078.431372549  # 600 TFLOPS FP4 dense (1200 sparse / 2)
MAC_per_cycle_nvfp4_tc: 196078.431372549
